name: Test Report
run-name: "Test Report for '${{ github.event.workflow_run.head_branch }}' (CI run #${{ github.event.workflow_run.run_number }})"
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      actions: read
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download test results
      id: download
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: test-results-${{ github.event.workflow_run.id }}
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path: test-results

    - name: Publish test results
      uses: dorny/test-reporter@v1
      if: steps.download.outcome == 'success'
      with:
        name: Unit Tests
        path: test-results/**/*.xml
        reporter: java-junit
        fail-on-error: true
        fail-on-empty: false
